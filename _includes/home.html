<div class="loading-animation">
  <section class="home">
    <div class="section">
      <span class="title"><span class="label-emoji">✍️</span>&nbsp;최근 게시물</span>
      <div class="content">
        <table class="catalogue">
          <tr>
            {% assign sorted = site.pages | sort: 'date' | reverse | where: 'type', 'research' %}
            {% for page in sorted limit: 2 %}
            {% if page.use_math %}
  {% include mathjax_support.html %}
{% endif %}
            {% include post-card.html %}
            {% endfor %}
            
          </tr>
        </table>
        
      </div>
    </div>
    {% comment %} <div class="section">
      <span class="title"><span class="label-emoji">🤟</span>&nbsp;유튭</span>
      <div class="content video">
        <iframe src="https://링크 here" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div> {% endcomment %}
  </section>



</div>
